apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-status-api
  namespace: jenkins-cicd-lab
  labels:
    app.kubernetes.io/name: order-status-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: jenkins-cicd-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: order-status-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: order-status-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: jenkins-cicd-lab
    spec:
      containers:
        - name: order-status-api
          image: order-status-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: APP_NAME
              value: Order Status API
            - name: APP_VERSION
              value: "1.0.0"
            - name: PORT
              value: "3000"
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
